<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cards Against Talk Titles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Cards Against<br>Talk Titles</h1>
    <p>Fill in the blanks to find your next conference talk idea.</p>
  </header>

  <!-- Poll Screen -->
  <div class="poll-screen" id="poll-screen">
    <div class="poll-card">
      <p class="poll-intro">Tell us a bit about yourself so we can pick the best cards for you.</p>

      <div class="poll-question">
        <h2>Have you given a talk or presentation before?</h2>
        <div class="poll-options" data-question="spoken">
          <button class="poll-option" data-value="0">Nope, this is new to me!</button>
          <button class="poll-option" data-value="1">Once or twice</button>
          <button class="poll-option" data-value="2">I'm a seasoned speaker</button>
        </div>
      </div>

      <div class="poll-question">
        <h2>Where are you in your journey?</h2>
        <div class="poll-options" data-question="career">
          <button class="poll-option" data-value="0">Student or just learning</button>
          <button class="poll-option" data-value="1">Early in my career</button>
          <button class="poll-option" data-value="2">A few years in</button>
          <button class="poll-option" data-value="3">Seasoned pro</button>
        </div>
      </div>

      <button class="btn btn-start" id="start-btn" disabled>Deal my cards!</button>
      <button class="poll-skip" id="skip-poll">Just give me everything</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div class="game-screen" id="game-screen">
    <div class="controls">
      <span class="card-count" id="card-count"></span>
      <button class="btn" id="draw-btn">Draw a Card</button>
    </div>
    <button class="change-prefs" id="change-prefs">&larr; Change preferences</button>

    <div class="hand" id="hand"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
      <div class="modal">
        <p class="modal-title" id="modal-heading">Fill in the blanks</p>
        <div class="modal-preview" id="modal-preview" aria-live="polite"></div>
        <div class="fill-inputs" id="fill-inputs"></div>
        <div class="modal-actions">
          <span class="copy-feedback" id="copy-feedback">✓ Copied!</span>
          <button class="btn btn-secondary" id="modal-close">Close</button>
          <button class="btn btn-secondary" id="copy-img-btn">Copy as Image</button>
          <button class="btn btn-primary" id="copy-btn">Copy Title</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
